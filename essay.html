<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refleksi Pembelajaran PJOK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,0.5),
rgba(0,0,0,0.5)
),
url("https://images.unsplash.com/photo-1517649763962-0c623066013b");

background-size:cover;
background-position:center;

min-height:100vh;

padding:30px;

}

.container{

max-width:900px;

margin:auto;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}

h1{

text-align:center;

color:#0F766E;

margin-bottom:10px;

}

p{

text-align:center;

margin-bottom:30px;

color:#666;

}

.question{

margin-bottom:25px;

}

label{

display:block;

font-weight:bold;

margin-bottom:10px;

}

textarea{

width:100%;

min-height:140px;

padding:15px;

border:1px solid #ddd;

border-radius:10px;

resize:vertical;

font-size:15px;

}

button{

width:100%;

padding:15px;

background:#0F766E;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#115E59;

}

</style>

</head>

<body>

<div class="container">

<h1>Refleksi Pembelajaran PJOK</h1>

<p>
Silakan isi pendapat Anda secara jujur untuk membantu meningkatkan kualitas pembelajaran PJOK.
</p>

<form id="essayForm">

<div class="question">

<label>
1. Refleksi
</label>

<textarea
id="refleksi"
placeholder="Ceritakan pengalaman atau hal yang paling berkesan selama mengikuti pembelajaran PJOK..."
required></textarea>

</div>

<div class="question">

<label>
2. Harapan
</label>

<textarea
id="harapan"
placeholder="Ceritakan tulisan dan harapan Anda terhadap pembelajaran PJOK pada tahun depan ...."
required></textarea>

</div>

<div class="question">

<label>
3. Evaluasi
</label>

<textarea
id="evaluasi"
placeholder="Bagaimana kegiatan pembelajaran PJOK selama 1 semester ini dan apa yang harus diperbaiki"
required></textarea>

</div>

<button type="submit">

Kirim Jawaban

</button>

</form>

</div>

<script>

document.getElementById("essayForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const data = {

tipe:"essay",

refleksi:
document.getElementById("refleksi").value,

harapan:
document.getElementById("harapan").value,

evaluasi:
document.getElementById("evaluasi").value

};

try{

await fetch(
"https://script.google.com/macros/s/AKfycbyqoWgE_wa7Es1aob7B2s0jLKGYRgoQH7s3NdRgrpqWH8TN-ERX4ycQt2dB099tN_LY6w/exec",
{
method:"POST",
body:JSON.stringify(data)
}
);

alert("Terima kasih atas partisipasi Anda.");

window.location.href =
"https://mfakhri10.github.io/e-pjok/";

}catch(error){

alert("Gagal mengirim data.");

console.log(error);

}

});

</script>

</body>
</html>
